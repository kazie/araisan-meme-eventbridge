name: Java CI with Gradle

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read
  actions: read # For actions/upload-artifact

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build with Gradle
        run: ./gradlew linkReleaseExecutableHost

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: araisan-meme-server
          path: build/bin/host/releaseExecutable/araisan-meme-server.kexe
